<!DOCTYPE html>
<html>
    <link rel="stylesheet" href="sign-up-form.css">
    <title class="title">Odin Sign-up Form</title>
    <head>
        <div>This is not a real online service! You know you need something like this
            in your life to help you realize your deepest dreams. Sign up now to get started.
        </div>
        <div>Lets do this!</div>
    </head>
    <body>
        <div class="image">
            <img src="images/halie-west-25xggax4bSA-unsplash.jpg">
            <img src="images/odin-lined.png">
            <div class="company-name">ODIN</div>
        </div>
        
        <form action="example.com/path" method="post">
            <div class="user-creds">
                <label for="first_name">First Name:</label>
            </div>
            <input type="text">
            <div class="user-creds">
                <label for="last_name">Last Name:</label>
            </div>
            <input type="text">
            <div class="user-creds">
                <label for="email">Email:</label>
            </div>
            <input type="text">
            <div class="user-creds">
                <label for="phone_number">Phone Number:</label>
            </div>
            <input type="text">
            <div class="user-creds">
                <label for="password">Password:</label>
            </div>
            <input type="text">
            <div class="user-creds">
                <label for="confirm_password">Confirm Password:</label>
            </div>
            <input type="text">
        </form>
        <button class="create-account-button">Create Account</button>
        <div class="log-in-statement">
            <div>Already have an account?</div>
            <div>Log in</div>
        </div>
    </body>
</html>
